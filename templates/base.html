<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>ShopDJ | {% block title %}{% endblock %}</title>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
</head>
<body>
  <nav class='navbar navbar-expand-lg navbar-dark bg-info'>
    <div class='container-fluid px-4'>
      <a class='navbar-brand fw-bold' href='{% url "shop:product_list" %}'>
        🛒 ShopDJ
      </a>
      
      <div class='d-flex align-items-center gap-3'>
        <a href='{% url "cart:detail" %}' class='btn btn-outline-light btn-sm'>
          🛒 Cart ({{ cart|length }})
        </a>
        
        {% if user.is_authenticated %}
          <span class='text-light'>
            👤 <strong>{{ user.username }}</strong>
          </span>
          <a href='{% url "orders:history" %}' class='btn btn-outline-info btn-sm'>
            My Orders
          </a>
          {% if user.is_staff %}
            <a href='/admin/' class='btn btn-warning btn-sm'>Admin Panel</a>
          {% endif %}
          <a href='{% url "accounts:logout" %}' class='btn btn-outline-danger btn-sm'>
            Logout
          </a>
        {% else %}
          <a href='{% url "accounts:login" %}' class='btn btn-outline-light btn-sm'>
            Login
          </a>
          <a href='{% url "accounts:register" %}' class='btn btn-warning btn-sm'>
            Register
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class='container mt-4'>
    {% for message in messages %}
      <div class='alert alert-{{ message.tags }}'>{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
  <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'></script>
</body></html>
