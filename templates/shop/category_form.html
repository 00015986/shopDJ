{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ action }} Category{% endblock %}

{% block content %}
<div class='row justify-content-center'>
  <div class='col-md-6'>
    <div class='card'>
      <div class='card-body'>
        <h2 class='card-title'>{{ action }} Category</h2>
        <form method='post'>
          {% csrf_token %}
          {{ form|crispy }}
          <div class='d-flex justify-content-between mt-3'>
            <a href='{% url "shop:category_list" %}' class='btn btn-secondary'>
              Cancel
            </a>
            <button type='submit' class='btn btn-primary'>
              {{ action }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
