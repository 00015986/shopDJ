name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/shopdj

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: CODE QUALITY & TESTING
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run flake8 (Code Quality)
        run: |
          flake8 . --count --max-line-length=120 --exclude=migrations,venv,env --extend-ignore=E221,E231,E302,F401,W293,W291,E261,E265,W391,E128,E303,E501,W292 --statistics
      
      - name: Run tests with pytest
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: False
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          pytest -v --tb=short


  # ═══════════════════════════════════════════════════════════
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract commit SHA (short)
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════
  # JOB 3: DEPLOY TO AZURE SERVER
  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to Azure server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/shopDJ
            
            # Pull latest code
            git pull origin main || git pull origin master
            
            # Pull latest Docker images
            docker compose pull web
            
            # Restart web service only (zero downtime)
            docker compose up -d --no-deps --build web
            
            # Run migrations
            docker compose exec -T web python manage.py migrate --noinput
            
            # Collect static files
            docker compose exec -T web python manage.py collectstatic --noinput
            
            # Clean up old images
            docker image prune -f
