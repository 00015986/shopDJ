# Define upstream (where Django/Gunicorn runs)
upstream django_app {
    server web:8000;  # 'web' = service name in docker-compose
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 10M;  # Allow 10MB file uploads

    # Serve static files directly (no Django needed)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;  # Cache static files in browser for 30 days
        add_header Cache-Control "public, immutable";
    }

    # Serve media files directly (product images)
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Forward all other requests to Django
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
